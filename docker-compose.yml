version: '3.9'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    ports:
      - '5000:5000'
    volumes:
      - ./backend/storage:/app/storage

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run worker
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: http://backend:5000/api
    depends_on:
      - backend
    ports:
      - '5173:80'

volumes:
  mongo-data:
